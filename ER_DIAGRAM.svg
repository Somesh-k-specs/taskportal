<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
  <!-- Title -->
  <text x="500" y="30" font-size="28" font-weight="bold" text-anchor="middle" fill="#333">
    DoAble Task Management - ER Diagram
  </text>

  <!-- Users Table -->
  <rect x="50" y="100" width="350" height="280" fill="#E8F4F8" stroke="#0066CC" stroke-width="2" rx="5"/>
  
  <!-- Users Table Header -->
  <rect x="50" y="100" width="350" height="40" fill="#0066CC" stroke="#0066CC" stroke-width="2" rx="5"/>
  <text x="225" y="130" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
    USERS
  </text>

  <!-- Users Table Fields -->
  <text x="70" y="160" font-size="14" font-weight="bold" fill="#333">id</text>
  <text x="300" y="160" font-size="12" fill="#666">BIGINT, PK, AUTO_INCREMENT</text>

  <text x="70" y="190" font-size="14" font-weight="bold" fill="#333">username</text>
  <text x="300" y="190" font-size="12" fill="#666">VARCHAR(50), UNIQUE, NOT NULL</text>

  <text x="70" y="220" font-size="14" font-weight="bold" fill="#333">email</text>
  <text x="300" y="220" font-size="12" fill="#666">VARCHAR(100), UNIQUE, NOT NULL</text>

  <text x="70" y="250" font-size="14" font-weight="bold" fill="#333">password</text>
  <text x="300" y="250" font-size="12" fill="#666">VARCHAR(255), NOT NULL (BCrypt)</text>

  <text x="70" y="280" font-size="14" font-weight="bold" fill="#333">created_at</text>
  <text x="300" y="280" font-size="12" fill="#666">DATETIME, DEFAULT NOW()</text>

  <!-- Users Table Relationships -->
  <text x="70" y="320" font-size="12" fill="#0066CC" font-weight="bold">Relationships:</text>
  <text x="70" y="345" font-size="11" fill="#666">• 1 User → Many Tasks</text>
  <text x="70" y="365" font-size="11" fill="#666">• One-to-Many (1:N)</text>

  <!-- Tasks Table -->
  <rect x="550" y="100" width="400" height="380" fill="#F0E8F8" stroke="#9933CC" stroke-width="2" rx="5"/>
  
  <!-- Tasks Table Header -->
  <rect x="550" y="100" width="400" height="40" fill="#9933CC" stroke="#9933CC" stroke-width="2" rx="5"/>
  <text x="750" y="130" font-size="18" font-weight="bold" text-anchor="middle" fill="white">
    TASKS
  </text>

  <!-- Tasks Table Fields -->
  <text x="570" y="160" font-size="14" font-weight="bold" fill="#333">id</text>
  <text x="800" y="160" font-size="12" fill="#666">BIGINT, PK, AUTO_INCREMENT</text>

  <text x="570" y="190" font-size="14" font-weight="bold" fill="#333">title</text>
  <text x="800" y="190" font-size="12" fill="#666">VARCHAR(255), NOT NULL</text>

  <text x="570" y="220" font-size="14" font-weight="bold" fill="#333">description</text>
  <text x="800" y="220" font-size="12" fill="#666">TEXT, NULLABLE</text>

  <text x="570" y="250" font-size="14" font-weight="bold" fill="#333">priority</text>
  <text x="800" y="250" font-size="12" fill="#666">ENUM('LOW','MEDIUM','HIGH')</text>

  <text x="570" y="280" font-size="14" font-weight="bold" fill="#333">status</text>
  <text x="800" y="280" font-size="12" fill="#666">ENUM('TODO','IN_PROGRESS','DONE')</text>

  <text x="570" y="310" font-size="14" font-weight="bold" fill="#333">due_date</text>
  <text x="800" y="310" font-size="12" fill="#666">DATE, NULLABLE</text>

  <text x="570" y="340" font-size="14" font-weight="bold" fill="#333">created_at</text>
  <text x="800" y="340" font-size="12" fill="#666">DATETIME, DEFAULT NOW()</text>

  <text x="570" y="370" font-size="14" font-weight="bold" fill="#333">updated_at</text>
  <text x="800" y="370" font-size="12" fill="#666">DATETIME, ON UPDATE NOW()</text>

  <text x="570" y="400" font-size="14" font-weight="bold" fill="#CC0000">user_id</text>
  <text x="800" y="400" font-size="12" fill="#666">BIGINT, FK (users.id)</text>

  <text x="570" y="430" font-size="12" fill="#0066CC" font-weight="bold">Constraints:</text>
  <text x="570" y="450" font-size="11" fill="#666">• CASCADE DELETE on user_id</text>

  <!-- Relationship Line -->
  <line x1="400" y1="240" x2="550" y2="240" stroke="#FF6600" stroke-width="3"/>
  
  <!-- Relationship Label -->
  <text x="460" y="235" font-size="12" fill="#FF6600" font-weight="bold">1:N</text>
  
  <!-- FK Reference -->
  <text x="405" y="255" font-size="11" fill="#FF6600">(user_id)</text>

  <!-- Legend -->
  <rect x="50" y="510" width="900" height="70" fill="#F5F5F5" stroke="#999" stroke-width="1" rx="3"/>
  
  <text x="70" y="535" font-size="12" fill="#333" font-weight="bold">Legend:</text>
  <text x="70" y="560" font-size="11" fill="#333">PK = Primary Key | FK = Foreign Key | 1:N = One-to-Many Relationship</text>
  
  <rect x="580" y="520" width="15" height="15" fill="#E8F4F8" stroke="#0066CC" stroke-width="2"/>
  <text x="610" y="533" font-size="11" fill="#333">Users Table</text>
  
  <rect x="580" y="545" width="15" height="15" fill="#F0E8F8" stroke="#9933CC" stroke-width="2"/>
  <text x="610" y="558" font-size="11" fill="#333">Tasks Table</text>
</svg>
