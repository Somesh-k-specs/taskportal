# App
spring.application.name=taskportal

# MySQL
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/taskportal?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:taskportal_super_secret_key_minimum_32_characters_long}
jwt.expiration=86400000

# Gemini AI
gemini.api.key=${GEMINI_API_KEY:}

# Server
server.port=8080